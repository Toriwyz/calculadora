<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

.calculadora{
background:#1f2937;
padding:25px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.35);
width:340px;
}

#display{
width:100%;
height:70px;
border:none;
outline:none;
border-radius:12px;
margin-bottom:20px;
padding:15px;
font-size:32px;
text-align:right;
background:#111827;
color:white;
}

.botoes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

button{
height:65px;
border:none;
border-radius:14px;
font-size:22px;
cursor:pointer;
transition:.2s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

.numero{
background:#374151;
color:white;
}

.operador{
background:#8b5cf6;
color:white;
}

.igual{
background:#22c55e;
color:white;
grid-column:span 2;
}

.limpar{
background:#ef4444;
color:white;
}

.zero{
grid-column:span 2;
}
</style>
</head>
<body>

<div class="calculadora">
<input type="text" id="display" disabled>

<div class="botoes">
<button class="limpar" onclick="limpar()">C</button>
<button class="operador" onclick="adicionar('/')">÷</button>
<button class="operador" onclick="adicionar('*')">×</button>
<button class="operador" onclick="adicionar('-')">−</button>

<button class="numero" onclick="adicionar('7')">7</button>
<button class="numero" onclick="adicionar('8')">8</button>
<button class="numero" onclick="adicionar('9')">9</button>
<button class="operador" onclick="adicionar('+')">+</button>

<button class="numero" onclick="adicionar('4')">4</button>
<button class="numero" onclick="adicionar('5')">5</button>
<button class="numero" onclick="adicionar('6')">6</button>
<button class="operador" onclick="adicionar('.')">.</button>

<button class="numero" onclick="adicionar('1')">1</button>
<button class="numero" onclick="adicionar('2')">2</button>
<button class="numero" onclick="adicionar('3')">3</button>
<button class="igual" onclick="calcular()">=</button>

<button class="numero zero" onclick="adicionar('0')">0</button>
</div>
</div>

<script>
function adicionar(valor){
document.getElementById("display").value += valor;
}

function limpar(){
document.getElementById("display").value = "";
}

function calcular(){
try{
let resultado = eval(document.getElementById("display").value);
document.getElementById("display").value = resultado;
}
catch{
document.getElementById("display").value = "Erro";
}
}
</script>

</body>
</html>
